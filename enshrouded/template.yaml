# yaml-language-server: $schema=../.schema/gametemplate.schema.json
apiVersion: gameplane.local/v1alpha1
kind: GameTemplate
metadata:
  name: enshrouded
  labels:
    gameplane.local/module: enshrouded
spec:
  displayName: Enshrouded
  game: enshrouded
  version: 1.0.2
  categories: [Survival, Co-op, Building, Adventure]
  accentColor: "#2a4b7c"
  description: Enshrouded dedicated server.
  image: mornedhels/enshrouded-server:latest@sha256:85978a10f88a85ab0a0aa92e9821d30424895d38bf81fe543532451219c42d0d

  versions:
    - id: 1-7-2
      displayName: "Game v1.7.2"
      image: mornedhels/enshrouded-server:1.7.2@sha256:85978a10f88a85ab0a0aa92e9821d30424895d38bf81fe543532451219c42d0d
      default: true
    - id: 1-7-1
      displayName: "Game v1.7.1"
      image: mornedhels/enshrouded-server:1.7.1@sha256:67fe03f7a7b9932d269757604c97b85bbee125270c5cfc746d00dd21a2309ddc
    - id: 1-7-0
      displayName: "Game v1.7.0"
      image: mornedhels/enshrouded-server:1.7.0@sha256:ca12415986fe84e585a2bd6cf5ba0a822a5c85c6caf1d557f5e607fdb2a84682
    - id: latest
      displayName: "Latest (moves on restart)"
      image: mornedhels/enshrouded-server:latest  # gameplane:floating

  ports:
    - name: game
      containerPort: 15636
      protocol: UDP
      advertise: true
    - name: query
      containerPort: 15637
      protocol: UDP
      advertise: false
  storage:
    size: 25Gi
    mountPath: /opt/enshrouded
  resources:
    requests: {cpu: "2", memory: 8Gi}
    limits: {cpu: "4", memory: 16Gi}
  # No remote console of any kind (no RCON, no stdin), so no capabilities
  # block and no actions — there is no transport to run a command over.
  rcon:
    protocol: none
  consoleMode: none
  configSchema:
    - name: SERVER_NAME
      displayName: Server Name
      type: string
      default: "Gameplane Enshrouded Server"
    - name: SERVER_SLOT_COUNT
      displayName: Max Players
      type: int
      default: "16"
      description: "Number of player slots (1-16)"
