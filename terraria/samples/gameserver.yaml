# Example GameServer for the terraria template.
#
# Apply in any namespace where Gameplane watches:
#     kubectl -n gameplane-games apply -f samples/gameserver.yaml

apiVersion: gameplane.gg/v1alpha1
kind: GameServer
metadata:
  name: terraria-01
  namespace: gameplane-games
spec:
  templateRef:
    name: terraria

  # Picks the tModLoader image tag + the tmodloader->ModPacks mod volume.
  # Use "vanilla-latest" for a vanilla server (no Mods tab).
  version: tmodloader-latest

  config:
    WORLDNAME: "Gameplane"
    AUTOCREATE: "2"
    DIFFICULTY: "1"
    MAXPLAYERS: "8"
    MOTD: "Welcome to a Gameplane-hosted Terraria server"
    # MODPACK: my-modpack   # set after installing a modpack via the Mods tab

  networking:
    expose: NodePort
    portOverrides:
      - name: game
        nodePort: 30777

  storage:
    size: 4Gi

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi
