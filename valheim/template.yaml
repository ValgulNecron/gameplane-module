# yaml-language-server: $schema=../.schema/gametemplate.schema.json
# Gameplane GameTemplate for Valheim (dedicated server).
#
# Backed by lloesche/valheim-server, which installs the game via SteamCMD on
# start — that install output streams to the dashboard's Logs tab (source
# "pod"). There is no persistent logfile, so logPath is intentionally unset.
# No RCON — the Console tab attaches to container stdin/stdout (pty).
#
# Version choice is the Steam channel (stable vs public-test) via the
# PUBLIC_TEST env, surfaced as a version picker; each channel gets its own
# BepInEx mod volume.
#
# Cluster-scoped; apply once per cluster:
#     kubectl apply -f modules/valheim/template.yaml

apiVersion: gameplane.local/v1alpha1
kind: GameTemplate
metadata:
  name: valheim
  labels:
    gameplane.local/module: valheim
spec:
  displayName: Valheim (Dedicated)
  game: valheim
  version: 2.3.3
  categories: [Survival, Co-op, Building]
  # Brand color the dashboard tints this game's icon/accents with.
  accentColor: "#d99a2b"
  description: |
    Valheim dedicated server using
    [lloesche/valheim-server](https://github.com/lloesche/valheim-server-docker).
    World persistence, password, crossplay, and BepInEx mods. Choose the
    stable or public-test channel in the New Server wizard.

  image: lloesche/valheim-server:latest@sha256:20fde516ce311e6084f82f295c9eb6934af57b357c657937a04f62bdf5946149

  env:
    - name: STATUS_HTTP
      value: "true"
    - name: STATUS_HTTP_PORT
      value: "80"

  ports:
    - name: game
      containerPort: 2456
      protocol: UDP
      advertise: true
    - name: game2
      containerPort: 2457
      protocol: UDP
      advertise: true
    - name: game3
      containerPort: 2458
      protocol: UDP
      advertise: true
    - name: status
      containerPort: 80
      protocol: TCP
      advertise: false

  storage:
    size: 5Gi
    mountPath: /config

  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 6Gi

  # Valheim doesn't speak RCON — player count flows through the status HTTP
  # endpoint, so the agent uses `protocol: none`.
  rcon:
    protocol: none

  # No RCON, but the server logs useful state to stdout. Expose it via the
  # kubelet's pod-attach API so the Console tab streams stdout (and accepts
  # stdin). The operator sets tty/stdin on the game container for "pty".
  consoleMode: pty

  # Steam release channel as the "version" axis. Both entries run the same
  # image; PUBLIC_TEST selects which Steam build SteamCMD installs. Each
  # channel carries the "bepinex" loader so its mod set lives on its own
  # volume (a public-test mod set never leaks into stable).
  versions:
    - id: stable
      displayName: "Stable"
      image: lloesche/valheim-server:latest@sha256:20fde516ce311e6084f82f295c9eb6934af57b357c657937a04f62bdf5946149
      loader: bepinex
      default: true
      env:
        - { name: PUBLIC_TEST, value: "false" }
    - id: public-test
      displayName: "Public Test (beta)"
      image: lloesche/valheim-server:latest@sha256:20fde516ce311e6084f82f295c9eb6934af57b357c657937a04f62bdf5946149
      loader: bepinex
      env:
        - { name: PUBLIC_TEST, value: "true" }

  probes:
    readiness:
      httpGet:
        path: /status.json
        port: status
      initialDelaySeconds: 60
      periodSeconds: 15
      failureThreshold: 10

  # No RCON, so no players/quiesce/status capabilities — mods only. No
  # actions either: despite consoleMode: pty, research confirms the Valheim
  # dedicated server binary has NO stdin command input at all — the pty
  # here only streams stdout, it never reads commands back. Admin commands
  # are in-game only, via the F5 console, so no quick action is possible.
  # BepInEx plugins live under /config/bepinex/plugins; the image loads them
  # when BEPINEX is enabled (see the config field below).
  capabilities:
    mods:
      loaders:
        bepinex:
          displayName: BepInEx plugins
          path: bepinex/plugins
          # Thunderstore packages are .zip archives; the agent unpacks each
          # into its own folder under plugins/ so BepInEx (recursive scan)
          # loads the contained .dll(s).
          extensions: [".zip"]
          extract: true
      install:
        allowedHosts:
          - thunderstore.io
          - gcdn.thunderstore.io
          - .thunderstore.io
          - github.com
          - .githubusercontent.com
        maxSizeMB: 256
      # In-app browse: the Mods tab can search the Thunderstore Valheim
      # community and one-click install BepInEx plugins. The download URL
      # 302-redirects thunderstore.io → gcdn.thunderstore.io; both hosts
      # are allowlisted above so the agent's redirect re-check passes.
      registry:
        providers:
          - provider: thunderstore
            community: valheim
            # Modpacks tab: Thunderstore modpacks are dependency manifests,
            # not a single file. With no refEnv, installing one resolves the
            # pack's dependencies and installs each (extracted) into plugins/.
            modpacks: {}

  configSchema:
    - name: SERVER_NAME
      displayName: Server name
      type: string
      required: true
      default: "Gameplane Valheim"
    - name: SERVER_PASS
      displayName: Password
      description: 5+ characters. Required by Valheim.
      type: password
      required: true
    - name: WORLD_NAME
      displayName: World
      type: string
      default: "Dedicated"
    - name: SERVER_PUBLIC
      displayName: List publicly
      type: bool
      default: "true"
    - name: BEPINEX
      displayName: Enable BepInEx mods
      description: Turn on the BepInEx mod loader. Required to use the Mods tab.
      type: bool
      default: "false"
    - name: UPDATE_CRON
      displayName: Auto-update cron
      description: When to check Steam for a game update. Blank disables.
      type: string
      default: "0 1 * * *"
    - name: BACKUPS
      displayName: In-container backups
      description: lloesche image also rolls backups. The Gameplane Backup CRD is the preferred path; leave off.
      type: bool
      default: "false"
