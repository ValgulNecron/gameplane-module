# Kestrel GameTemplate for Valheim (dedicated server).
#
# Backed by lloesche/valheim-server — a community-maintained image that
# understands SERVER_NAME, SERVER_PASS, WORLD_NAME env vars.
#
#   kubectl apply -f modules/valheim/template.yaml

apiVersion: kestrel.gg/v1alpha1
kind: GameTemplate
metadata:
  name: valheim
  labels:
    kestrel.gg/module: valheim
spec:
  displayName: Valheim (Dedicated)
  game: valheim
  version: 1.0.0
  # Brand color the dashboard tints this game's icon/accents with.
  accentColor: "#d99a2b"
  description: |
    Valheim dedicated server using [lloesche/valheim-server](https://github.com/lloesche/valheim-server-docker).
    Supports world persistence, password, crossplay, and BepInEx mods.

  image: lloesche/valheim-server:latest

  env:
    - name: STATUS_HTTP
      value: "true"
    - name: STATUS_HTTP_PORT
      value: "80"

  ports:
    - name: game
      containerPort: 2456
      protocol: UDP
      advertise: true
    - name: game2
      containerPort: 2457
      protocol: UDP
      advertise: true
    - name: game3
      containerPort: 2458
      protocol: UDP
      advertise: true
    - name: status
      containerPort: 80
      protocol: TCP
      advertise: false

  storage:
    size: 5Gi
    mountPath: /config

  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 6Gi

  # Valheim doesn't speak RCON — player count + kicks flow through the
  # status HTTP endpoint, so the agent uses `protocol: none`.
  rcon:
    protocol: none

  # No RCON, but the server logs lots of useful state to stdout. Expose
  # it via the kubelet's pod-attach API so the dashboard's Console tab
  # streams stdout (and accepts stdin) directly. The operator sets
  # tty/stdin on the game container when consoleMode is "pty".
  consoleMode: pty

  probes:
    readiness:
      httpGet:
        path: /status
        port: status
      initialDelaySeconds: 60
      periodSeconds: 15
      failureThreshold: 10

  configSchema:
    - name: SERVER_NAME
      displayName: Server name
      type: string
      required: true
      default: "Kestrel Valheim"
    - name: SERVER_PASS
      displayName: Password
      description: 5+ characters. Required by Valheim.
      type: password
      required: true
    - name: WORLD_NAME
      displayName: World
      type: string
      default: "Dedicated"
    - name: SERVER_PUBLIC
      displayName: List publicly
      type: bool
      default: "true"
    - name: UPDATE_CRON
      displayName: Auto-update cron
      description: When to check Steam for a game update. Blank disables.
      type: string
      default: "0 1 * * *"
    - name: BACKUPS
      displayName: In-container backups
      description: lloesche image also rolls backups. Kestrel Backup CRD is the preferred path; leave off.
      type: bool
      default: "false"
