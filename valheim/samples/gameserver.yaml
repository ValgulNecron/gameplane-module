apiVersion: gameplane.local/v1alpha1
kind: GameServer
metadata:
  name: valheim-01
  namespace: gameplane-games
spec:
  templateRef:
    name: valheim

  # Steam channel; "stable" resolves PUBLIC_TEST=false + the bepinex volume.
  # Use "public-test" for the beta channel.
  version: stable

  config:
    SERVER_NAME: "Gameplane Valheim"
    SERVER_PASS: "change-me-please"
    WORLD_NAME: "Dedicated"
    SERVER_PUBLIC: "true"
    BEPINEX: "true"        # required for the Mods tab to take effect

  networking:
    expose: NodePort
    portOverrides:
      - name: game
        nodePort: 32456
      - name: game2
        nodePort: 32457
      - name: game3
        nodePort: 32458

  storage:
    size: 5Gi

  resources:
    requests: { cpu: 1, memory: 2Gi }
    limits:   { cpu: 2, memory: 6Gi }
