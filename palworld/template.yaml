# yaml-language-server: $schema=../.schema/gametemplate.schema.json
# Gameplane GameTemplate for Palworld (dedicated server).
#
# Backed by the community thijsvanloef/palworld-server-docker image. The
# game server itself is installed/updated by steamcmd on boot
# (UPDATE_ON_BOOT), so the FIRST start downloads several GB — the startup
# probe budgets for that, and the install output streams to the dashboard's
# Logs tab (source "pod").
#
# The versions[] picker selects the WRAPPER image channel (the game itself
# always tracks Steam): latest, the v2 major line, or a pinned wrapper
# release for change-averse servers.
#
# RCON is OFFICIALLY DEPRECATED upstream (docs.palworldgame.com: "scheduled
# to stop functioning in an upcoming update"), so this module now runs
# Palworld's REST admin API instead (rcon.protocol: palworld). The REST API
# authenticates with HTTP Basic (user "admin") against the server's
# AdminPassword — the same secret RCON used, so the operator-generated
# password still lands via ADMIN_PASSWORD, unchanged. The API is HTTP-only
# (no TLS), which is fine here: the agent dials it pod-local, never over the
# network. It's also strictly better than RCON for this game: the REST
# player list returns real per-player records (RCON's ShowPlayers was a CSV
# scrape), and its announce endpoint keeps spaces in the message, where
# RCON's Broadcast truncated at the first space.
#
# Cluster-scoped; apply once per cluster:
#     kubectl apply -f modules/palworld/template.yaml

apiVersion: gameplane.local/v1alpha1
kind: GameTemplate
metadata:
  name: palworld
  labels:
    gameplane.local/module: palworld
spec:
  displayName: Palworld (Dedicated)
  game: palworld
  # Kept in lockstep with module.yaml's bundle version.
  version: 1.2.0
  categories: [Survival, Sandbox, Co-op]
  # Brand color the dashboard tints this game's icon/accents with.
  accentColor: "#3d9dd9"
  description: |
    Palworld dedicated server using
    [thijsvanloef/palworld-server-docker](https://github.com/thijsvanloef/palworld-server-docker).
    The game installs via steamcmd on first boot (several GB — give it a few
    minutes). Console via Palworld's REST admin API (RCON is deprecated
    upstream), a save-then-shutdown graceful stop, and a `.pak` mod volume
    with archive install from the Mods tab.

  # Fallback image when a server selects no version. versions[] below is the
  # authoritative source for the wizard's picker.
  image: thijsvanloef/palworld-server-docker:latest@sha256:4145c58737fcd9f9f03d35de6bf33c0008b829b65d3080822bc46830bdb38fdf

  # REQUIRED. The image starts as root but its entrypoint DROPS privileges to
  # PUID/PGID (1000). The data PVC is root-owned, so the dropped-privilege
  # user cannot chmod the files SteamCMD just installed, and the server dies:
  #     ./PalServer.sh is not executable.
  # It then exits 0 and restart-loops (92 times on the test cluster before
  # SteamCMD's resume finally clawed through). fsGroup makes the kubelet chown
  # the volume to gid 1000 so the dropped user owns its own install.
  # Do NOT set runAsUser here — the image must START as root in order to drop.
  security:
    fsGroup: 1000

  env:
    - name: REST_API_ENABLED
      value: "true"
    - name: REST_API_PORT
      value: "8212"
    - name: PORT
      value: "8211"
    - name: QUERY_PORT
      value: "27015"
    # Install/update the server via steamcmd at container start. Required on
    # the very first boot; afterwards it keeps the game current with Steam.
    - name: UPDATE_ON_BOOT
      value: "true"

  ports:
    - name: game
      containerPort: 8211
      protocol: UDP
      advertise: true
    - name: query
      containerPort: 27015
      protocol: UDP
      advertise: false
    - name: rest-api
      containerPort: 8212
      protocol: TCP
      # An admin API must never be exposed publicly.
      advertise: false

  # The whole server install lives on the data volume (steamcmd target dir),
  # so game files, saves, and mods all persist together.
  storage:
    size: 20Gi
    mountPath: /palworld

  resources:
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      cpu: "4"
      memory: 12Gi

  rcon:
    protocol: palworld
    port: 8212
    # The REST API authenticates with HTTP Basic (user "admin") against the
    # server's AdminPassword — the same secret RCON used, so the operator's
    # generated password still lands via ADMIN_PASSWORD, unchanged.
    passwordEnv: ADMIN_PASSWORD

  # Wrapper-image channels. The game version always tracks Steam (steamcmd
  # updates on boot); these pin how eagerly the WRAPPER scripts update. All
  # entries share the "pak" loader so the mod volume follows across.
  versions:
    - id: latest
      displayName: "Latest wrapper"
      image: thijsvanloef/palworld-server-docker:latest@sha256:4145c58737fcd9f9f03d35de6bf33c0008b829b65d3080822bc46830bdb38fdf
      loader: pak
      default: true
    - id: v2
      displayName: "v2 wrapper (major line)"
      image: thijsvanloef/palworld-server-docker:v2@sha256:4145c58737fcd9f9f03d35de6bf33c0008b829b65d3080822bc46830bdb38fdf
      loader: pak
    - id: v2-4-1
      displayName: "v2.4.1 wrapper (pinned)"
      image: thijsvanloef/palworld-server-docker:v2.4.1@sha256:ca18aa7ee82d4a0aaa52cbba4437633bf7cf3dda67bf570188c71d232374f6c3
      loader: pak

  capabilities:
    players:
      # /v1/api/players returns JSON; the agent applies entryRegex with
      # FindAll across the whole reply, so this lifts out every player's
      # display name.
      list:
        command: "players"
        entryRegex: '"name"\s*:\s*"(?P<name>[^"]*)"'
      # No kick/ban: Palworld's REST kick/ban moderate by userId (e.g.
      # "steam_12345"), a field distinct from the display "name" captured
      # above — and the agent's players-list pipeline has only one captured
      # value, reused both for the Players tab display and for {{.Player}}
      # in a kick/ban template. Capturing "name" here means a kick/ban
      # action would send the display name where the REST API expects a
      # userId, silently targeting nothing or the wrong account. Same
      # principle as DayZ (BE moderates by player number, not name): omit
      # rather than ship a button that can't reliably work.
    # No quiesce block: Palworld's "save" is a one-shot flush, not a
    # pausable state, so the pause/resume quiesce model doesn't fit (the
    # operator requires both a quiesce and an unquiesce command). Backups
    # snapshot the volume while the server autosaves; lifecycle.stop below
    # saves on graceful stop.
    lifecycle:
      stop: ["save", "shutdown 1"]
    actions:
      - id: broadcast
        displayName: Broadcast message
        description: Send a chat message to everyone on the server.
        icon: megaphone
        group: Server
        # Unlike the deprecated RCON Broadcast (which truncated at the
        # first space), the REST announce endpoint keeps the full message.
        command: "announce {{.Params.message}}"
        params:
          - name: message
            displayName: Message
            type: string
            required: true
      - id: save-world
        displayName: Save world
        description: Flush the world to disk now.
        icon: save
        group: World
        command: "save"
      - id: announce-restart
        displayName: Announce restart
        description: Warn players, then shut down after a countdown so the operator restarts cleanly.
        icon: rotate-ccw
        group: Server
        danger: true
        confirm: true
        command: "shutdown {{.Params.seconds}} {{.Params.message}}"
        params:
          - name: seconds
            displayName: Countdown (seconds)
            type: int
            default: "60"
            required: true
          - name: message
            displayName: Message
            type: string
            default: "Server restarting shortly."
            required: true
    # Engine-native .pak mods, loaded from Pal/Content/Paks/~mods inside the
    # server install. URL installs are limited to GitHub (most server-side
    # pak mods publish there); local files can be added via upload. UE4SS
    # Lua modding is NOT bundled (experimental on Linux servers) — see the
    # README for the manual route.
    mods:
      loaders:
        pak:
          displayName: Pak mods
          path: "Pal/Content/Paks/~mods"
          extensions: [".pak"]
      install:
        allowedHosts:
          - github.com
          - .githubusercontent.com
        maxSizeMB: 512

  probes:
    # First boot = multi-GB steamcmd download before anything listens, so
    # the startup probe budgets ~30 minutes. The REST API's TCP port is the
    # only reliable liveness signal (game traffic is UDP).
    startup:
      tcpSocket:
        port: rest-api
      initialDelaySeconds: 30
      periodSeconds: 15
      failureThreshold: 120
    readiness:
      tcpSocket:
        port: rest-api
      periodSeconds: 10
      failureThreshold: 6
    liveness:
      tcpSocket:
        port: rest-api
      periodSeconds: 30
      failureThreshold: 5

  # Field names match thijsvanloef/palworld-server-docker env vars exactly.
  configSchema:
    - name: SERVER_NAME
      displayName: Server name
      type: string
      default: "A Gameplane Palworld server"
      required: true
    - name: SERVER_DESCRIPTION
      displayName: Server description
      type: string
      default: ""
    - name: SERVER_PASSWORD
      displayName: Server password
      description: Required to join. Leave blank for an open server (not with COMMUNITY).
      type: password
      default: ""
    - name: PLAYERS
      displayName: Max players
      description: 1-32.
      type: int
      default: "16"
    - name: COMMUNITY
      displayName: List in community browser
      description: Show the server in Palworld's community server list. Set a server password if enabled.
      type: bool
      default: "false"
    - name: MULTITHREADING
      displayName: Multithreading
      description: Improves performance on multi-core nodes (effective up to ~4 threads).
      type: bool
      default: "true"
