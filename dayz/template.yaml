# yaml-language-server: $schema=../.schema/gametemplate.schema.json
# Gameplane GameTemplate for DayZ (dedicated server).
#
# Backed by GodBleak/ServerZ (https://github.com/GodBleak/ServerZ), pulled
# from the project's own self-hosted OCI registry (registry.godbleak.dev —
# verified reachable and anonymously pullable; there is no Docker
# Hub/GHCR mirror). The previous draft's image (jammsen/dayz-dedicated-
# server) does not exist on any registry at all — this replaces it.
#
# DayZ speaks BattlEye RCon, a proprietary UDP protocol distinct from both
# Source RCON and telnet. The agent now implements it
# (rcon.protocol: battleye), so the console, players list and moderation
# work. The game binary has no interactive stdin console at all — admin is
# BattlEye RCon or nothing — so consoleMode is "rcon", not "pty".
#
# ServerZ only writes a beserver_x64.cfg at all if one of BE_IP/BE_PORT/
# BE_PASSWORD is set, so all three are set below: the operator injects the
# generated password into BE_PASSWORD, and BE_IP pins the listener to
# loopback, which is where the agent sidecar dials it from inside the pod.
#
# No lifecycle.stop: BattlEye RCon has a "#shutdown" command, but DayZ's
# is unreliable across builds and the server persists continuously rather
# than on a save command, so a SIGTERM is not the data-loss risk it is for
# Minecraft or Valheim. Left out rather than shipping a stop that lies.
#
# Cluster-scoped; apply once per cluster:
#     kubectl apply -f modules/dayz/template.yaml

apiVersion: gameplane.local/v1alpha1
kind: GameTemplate
metadata:
  name: dayz
  labels:
    gameplane.local/module: dayz
spec:
  displayName: DayZ
  game: dayz
  version: 1.1.1
  categories: [Survival, Shooter, PvP, Horror]
  accentColor: "#bd2020"
  description: |
    DayZ dedicated server using
    [GodBleak/ServerZ](https://github.com/GodBleak/ServerZ). Console and
    the players list run over BattlEye RCon. Kick/ban aren't offered:
    BattlEye targets players by number rather than name, so a button would
    risk hitting the wrong one — moderate in-game instead.

  image: registry.godbleak.dev/godbleak/serverz:latest

  env:
    # Fixed to match the declared ports[] below.
    - name: PORT
      value: "2302"
    - name: STEAM_QUERY_PORT
      value: "27015"
    # ServerZ generates beserver_x64.cfg only when one of BE_* is set.
    # BE_PASSWORD is injected by the operator (see rcon.passwordEnv).
    - name: BE_PORT
      value: "2305"
    # Bind RCon to loopback: the agent sidecar shares the pod's network
    # namespace, so it reaches 127.0.0.1:2305 — and an RCon port that is
    # not on a public interface cannot be brute-forced from the internet.
    - name: BE_IP
      value: "127.0.0.1"

  ports:
    - name: game
      containerPort: 2302
      protocol: UDP
      advertise: true
    - name: query
      containerPort: 27015
      protocol: UDP
      advertise: false

  # ServerZ documents four separate paths (/data, /overrides, /install,
  # /root/.steam) with no common parent besides /. Only /data (world/
  # profile state) is mounted — /install is left ephemeral, so every pod
  # (re)start re-downloads the ~10GB+ server via SteamCMD, the same
  # tradeoff the shipped valheim module already makes with lloesche's
  # image. See README for the mods/Steam-auth implication of this.
  storage:
    size: 40Gi
    mountPath: /data

  resources:
    requests:
      cpu: "2"
      memory: 6Gi
    limits:
      cpu: "4"
      memory: 12Gi

  rcon:
    protocol: battleye
    port: 2305
    # ServerZ writes this into beserver_x64.cfg as RConPassword.
    passwordEnv: BE_PASSWORD

  consoleMode: rcon

  capabilities:
    players:
      # BattlEye's "players" reply is a table:
      #   [#] [IP Address]:[Port] [Ping] [GUID] [Name]
      #   0   10.0.0.5:2304   32   abc123…(OK)  Survivor
      # followed by a "(N players in total)" footer, which this regex skips.
      list:
        command: "players"
        entryRegex: '^\s*\d+\s+\S+:\d+\s+\d+\s+\S+\s+(?P<name>.+?)\s*$'
      # BattlEye moderation is by player number, not name — the dashboard
      # passes what the list returned, so kick/ban are left unset rather
      # than shipping commands that would silently target the wrong player.
    # BattlEye RCon does support a small set of verified admin commands
    # beyond the players list: a global broadcast ("say -1 <msg>", no "#"
    # prefix) and a few "#"-prefixed server commands. kick-player below
    # asks for the BattlEye player number explicitly (read from the
    # players list above) rather than a name — the standard BE admin
    # workflow, and different from the auto-name-passing this module
    # declines for players.kick/ban above.
    actions:
      - id: broadcast
        displayName: Broadcast message
        description: Send a global message to all players.
        icon: megaphone
        group: Server
        command: "say -1 {{.Params.message}}"
        params:
          - name: message
            displayName: Message
            type: string
            required: true
      - id: kick-player
        displayName: Kick player
        description: Kick a player by their BattlEye player number (from the players list).
        icon: user-minus
        group: Players
        command: "#kick {{.Params.number}}"
        params:
          - name: number
            displayName: Player number
            type: int
            required: true
      - id: lock-server
        displayName: Lock server
        description: Stop new players from connecting (existing players stay).
        icon: lock
        group: Server
        command: "#lock"
      - id: unlock-server
        displayName: Unlock server
        description: Allow new connections again.
        icon: lock-open
        group: Server
        command: "#unlock"

  # No console/probes block: the game's only ports are UDP (no TCP surface
  # to probe), and there is no HTTP endpoint either. Kubernetes falls back
  # to "ready once the container is running" — accepted tradeoff, same
  # class of gap noted for Enshrouded in the module research pass.

  configSchema:
    - name: TEMPLATE
      displayName: Mission template
      description: e.g. "dayzOffline.chernarusplus" for the default map.
      type: string
      default: "dayzOffline.chernarusplus"
    - name: MOTD
      displayName: MOTD
      type: string
      default: ""
    - name: MOD_LIST
      displayName: Workshop mod IDs
      description: >-
        Comma-separated Steam Workshop item IDs. Requires a one-time
        interactive Steam login first — see README; leave blank to run
        vanilla with no Steam account needed at all.
      type: string
      default: ""
