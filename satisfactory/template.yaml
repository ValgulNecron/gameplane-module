# Gameplane GameTemplate for Satisfactory (dedicated server).
#
# Backed by the community wolveix/satisfactory-server image, which installs
# and updates the game via steamcmd on boot (the FIRST start downloads
# several GB — the install output streams to the dashboard's Logs tab,
# source "pod").
#
# Satisfactory has no socket RCON and no stdin console. What it does have is
# an official HTTPS function API on the game port (7777), which the agent now
# speaks (rcon.protocol: satisfactory): PasswordLogin yields a bearer token,
# then RunCommand runs a console command. That drives the Console tab and
# quick actions.
#
# ONE-TIME MANUAL STEP — the console stays inert until you do this. Unlike
# every other game here, Satisfactory's admin password is not a server config
# value the operator can inject: it only exists AFTER a human claims the
# server in-game (Server Manager -> claim -> set an admin password). The image
# exposes no env var or file to preseed it. So after claiming:
#
#     kubectl exec <pod> -c game -- \
#       sh -c 'mkdir -p /config/gameplane && \
#              printf %s "<the admin password you set>" \
#              > /config/gameplane/rcon-admin-password'
#
# The agent reads that file (rcon.passwordFile) on each connection and logs
# in with it. Until the file exists with the right password, the Console tab
# reports an auth failure — that is expected, not a bug.
#
# No capabilities.players: the API exposes a player COUNT (QueryServerState)
# but no way to enumerate names or IDs, so a players list can't be populated
# and moderation can't target a player. Left unset rather than shipping a tab
# that can't work. Backups snapshot the /config volume (gamefiles + saves);
# the image saves and shuts down cleanly on SIGTERM.
#
# The versions[] picker selects the Steam branch: the public release or the
# experimental build (STEAMBETA), both running the same image.
#
# Cluster-scoped; apply once per cluster:
#     kubectl apply -f modules/satisfactory/template.yaml

apiVersion: gameplane.local/v1alpha1
kind: GameTemplate
metadata:
  name: satisfactory
  labels:
    gameplane.local/module: satisfactory
spec:
  displayName: Satisfactory (Dedicated)
  game: satisfactory
  # Kept in lockstep with module.yaml's bundle version.
  version: 1.1.1
  categories: [Simulation, Building, Sandbox, Co-op]
  # Brand color the dashboard tints this game's icon/accents with.
  accentColor: "#e59344"
  description: |
    Satisfactory dedicated server using
    [wolveix/satisfactory-server](https://github.com/wolveix/satisfactory-server).
    The game installs via steamcmd on first boot (several GB — give it a few
    minutes; progress streams to the Logs tab). Console runs over
    Satisfactory's own HTTPS admin API and needs a one-time in-game server
    claim first (see the module README). The API exposes no player list, so
    there's no Players tab. Choose the stable or experimental Steam branch
    in the New Server wizard.

  # Fallback image when a server selects no version. versions[] below is the
  # authoritative source for the wizard's picker.
  image: wolveix/satisfactory-server:latest

  env:
    # Install/update the game via steamcmd at container start. Required on the
    # very first boot; afterwards it keeps the server current with Steam.
    - name: SKIPUPDATE
      value: "false"
    # Run as a fixed non-root uid/gid inside the image (gosu drops from root
    # after it fixes ownership on the data volume).
    - name: PUID
      value: "1000"
    - name: PGID
      value: "1000"

  ports:
    # Satisfactory 1.0 uses a single game port for both UDP and TCP, plus a
    # TCP "messaging" port. All are needed by clients, so all are advertised.
    - name: game
      containerPort: 7777
      protocol: UDP
      advertise: true
    - name: game-tcp
      containerPort: 7777
      protocol: TCP
      advertise: true
    - name: messaging
      containerPort: 8888
      protocol: TCP
      advertise: true

  # The whole server install lives on the data volume (steamcmd target dir),
  # so game files, saves, logs, and backups all persist together under /config.
  storage:
    size: 25Gi
    mountPath: /config

  resources:
    requests:
      cpu: "2"
      memory: 6Gi
    limits:
      cpu: "6"
      memory: 16Gi

  # Satisfactory speaks neither RCON nor a stdin console.
  rcon:
    protocol: satisfactory
    port: 7777
    # Not an image-managed file: the admin writes their claimed admin
    # password here once (see the header comment). Relative to the /config
    # data mount, so this is /config/gameplane/rcon-admin-password.
    passwordFile: gameplane/rcon-admin-password
  consoleMode: rcon

  # No probes declared: the operator adds none by default, so the pod is Ready
  # as soon as the container runs and the agent sidecar's heartbeat drives the
  # Running phase. Satisfactory exposes no HTTP/TCP health endpoint usable as a
  # readiness gate (the game port is UDP), and the first boot is a multi-GB
  # steamcmd download whose progress is visible in the Logs tab.

  # Steam branch as the "version" axis. Both entries run the same image;
  # STEAMBETA selects whether steamcmd installs the public release or the
  # experimental build. No loader (Satisfactory has no mod manager here).
  versions:
    - id: stable
      displayName: "Stable"
      image: wolveix/satisfactory-server:latest
      default: true
      env:
        - name: STEAMBETA
          value: "false"
    - id: experimental
      displayName: "Experimental"
      image: wolveix/satisfactory-server:latest
      env:
        - name: STEAMBETA
          value: "true"

  # Satisfactory's admin API (see rcon.protocol above) is deliberately
  # sparse — no broadcast, no time control, and no player enumeration
  # (which is also why there's no capabilities.players here). save-game,
  # via the RunCommand API, is the one verified action. Like the Console
  # tab, it stays inert until the one-time in-game claim + admin-password
  # file documented in the header comment above is done.
  capabilities:
    actions:
      - id: save-game
        displayName: Save game
        icon: save
        group: World
        command: "server.SaveGame {{.Params.name}}"
        params:
          - name: name
            displayName: Save name
            description: Save file name.
            type: string
            default: "gameplane"
            required: true

  # Field names match wolveix/satisfactory-server env vars exactly.
  configSchema:
    - name: MAXPLAYERS
      displayName: Max players
      description: Player limit for the server.
      type: int
      default: "4"
    - name: MAXTICKRATE
      displayName: Max tick rate
      description: Maximum simulation tick rate (Hz). Lower to reduce CPU load.
      type: int
      default: "30"
    - name: AUTOSAVENUM
      displayName: Autosave slots
      description: Number of rotating autosave files kept.
      type: int
      default: "5"
    - name: TIMEOUT
      displayName: Client timeout
      description: Seconds before an unresponsive client is dropped.
      type: int
      default: "30"
