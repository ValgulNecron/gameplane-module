# Gameplane GameTemplate for Minecraft: Java Edition.
#
# Backed by the community itzg/minecraft-server image, which downloads the
# selected server jar on first boot — the install output streams to the
# dashboard's Logs tab (source "pod") before the game's own logfile exists.
#
# Version+loader is chosen in the New Server wizard from spec.versions:
# each entry pins the itzg image (Java runtime) and injects the TYPE/VERSION
# env that select the server software. Each loader's mods/plugins live on
# their own per-(version+loader) volume, so switching never clobbers another.
#
# Cluster-scoped; apply once per cluster:
#     kubectl apply -f modules/minecraft-java/template.yaml

apiVersion: gameplane.local/v1alpha1
kind: GameTemplate
metadata:
  name: minecraft-java
  labels:
    gameplane.local/module: minecraft-java
spec:
  displayName: Minecraft (Java Edition)
  game: minecraft-java
  # Kept in lockstep with module.yaml's bundle version from 2.5.0 onward.
  version: 2.8.0
  categories: [Sandbox, Survival, Building, Modded, Creative]
  # Brand color the dashboard tints this game's icon/accents with.
  accentColor: "#5b9a3e"
  description: |
    Vanilla, Paper, Spigot, Bukkit, Purpur, Forge, NeoForge, Fabric, or Quilt
    Minecraft: Java Edition servers using the community
    [itzg/minecraft-server](https://github.com/itzg/docker-minecraft-server)
    image. Pick a version+loader in the New Server wizard; each loader's
    mods/plugins live on their own volume so switching never clobbers another.

  # Fallback image when a server selects no version (versions[] is the
  # authoritative source for the wizard). The tag only pins the itzg
  # release / Java runtime — TYPE and VERSION env select the software.
  image: itzg/minecraft-server:java21

  # INIT_MEMORY/MAX_MEMORY are configSchema fields (schema-resolved config
  # overrides template env on name collisions), so the JVM heap is visible
  # and adjustable in the wizard next to the container memory limit instead
  # of being silently pinned here.
  env:
    - name: EULA
      value: "TRUE"
    - name: ENABLE_RCON
      value: "true"
    - name: RCON_PORT
      value: "25575"

  ports:
    - name: game
      containerPort: 25565
      protocol: TCP
      advertise: true
    - name: rcon
      containerPort: 25575
      protocol: TCP
      advertise: false

  storage:
    size: 10Gi
    mountPath: /data

  # itzg/minecraft-server writes the server log under the data volume,
  # where the agent sidecar can tail it for the "Game log" toggle. (The
  # install/first-boot download is visible via the "Container output"
  # source even before this file exists.)
  logPath: /data/logs/latest.log

  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi

  rcon:
    protocol: source
    port: 25575
    # PasswordSecretRef left unset — the operator generates a password
    # into "<gameserver>-rcon" and injects it as RCON_PASSWORD.
    passwordEnv: RCON_PASSWORD

  # Version+loader catalog surfaced in the wizard. itzg selects software via
  # TYPE+VERSION env, so entries inject those rather than swapping the tag
  # (the tag pins only the itzg release / Java runtime: java8-multiarch for
  # ≤1.16.5, java17 for 1.18.2–1.20.x, java21 for 1.21.x, java25 for the
  # moving LATEST — current Minecraft needs a JRE newer than 21). The loader keys
  # into capabilities.mods.loaders below to pick the per-combo mod volume,
  # and is used verbatim as the Modrinth loader facet.
  versions:
    # ── Latest (moving) ────────────────────────────────────────────────
    - id: "latest-paper"
      displayName: "Latest · Paper"
      image: itzg/minecraft-server:java25
      loader: paper
      env:
        - { name: TYPE, value: PAPER }
        - { name: VERSION, value: LATEST }
    - id: "latest-fabric"
      displayName: "Latest · Fabric"
      image: itzg/minecraft-server:java25
      loader: fabric
      env:
        - { name: TYPE, value: FABRIC }
        - { name: VERSION, value: LATEST }
    - id: "latest-vanilla"
      displayName: "Latest · Vanilla"
      image: itzg/minecraft-server:java25
      loader: vanilla
      env:
        - { name: TYPE, value: VANILLA }
        - { name: VERSION, value: LATEST }
    # ── 1.21.4 ─────────────────────────────────────────────────────────
    - id: "1.21.4-paper"
      displayName: "1.21.4 · Paper"
      image: itzg/minecraft-server:java21
      loader: paper
      gameVersion: "1.21.4"
      default: true
      env:
        - { name: TYPE, value: PAPER }
        - { name: VERSION, value: "1.21.4" }
    - id: "1.21.4-purpur"
      displayName: "1.21.4 · Purpur"
      image: itzg/minecraft-server:java21
      loader: purpur
      gameVersion: "1.21.4"
      env:
        - { name: TYPE, value: PURPUR }
        - { name: VERSION, value: "1.21.4" }
    - id: "1.21.4-fabric"
      displayName: "1.21.4 · Fabric"
      image: itzg/minecraft-server:java21
      loader: fabric
      gameVersion: "1.21.4"
      env:
        - { name: TYPE, value: FABRIC }
        - { name: VERSION, value: "1.21.4" }
    - id: "1.21.4-quilt"
      displayName: "1.21.4 · Quilt"
      image: itzg/minecraft-server:java21
      loader: quilt
      gameVersion: "1.21.4"
      env:
        - { name: TYPE, value: QUILT }
        - { name: VERSION, value: "1.21.4" }
    - id: "1.21.4-forge"
      displayName: "1.21.4 · Forge"
      image: itzg/minecraft-server:java21
      loader: forge
      gameVersion: "1.21.4"
      env:
        - { name: TYPE, value: FORGE }
        - { name: VERSION, value: "1.21.4" }
    - id: "1.21.4-neoforge"
      displayName: "1.21.4 · NeoForge"
      image: itzg/minecraft-server:java21
      loader: neoforge
      gameVersion: "1.21.4"
      env:
        - { name: TYPE, value: NEOFORGE }
        - { name: VERSION, value: "1.21.4" }
    - id: "1.21.4-vanilla"
      displayName: "1.21.4 · Vanilla"
      image: itzg/minecraft-server:java21
      loader: vanilla
      gameVersion: "1.21.4"
      env:
        - { name: TYPE, value: VANILLA }
        - { name: VERSION, value: "1.21.4" }
    # ── 1.21.1 (NeoForge LTS line) ─────────────────────────────────────
    - id: "1.21.1-paper"
      displayName: "1.21.1 · Paper"
      image: itzg/minecraft-server:java21
      loader: paper
      gameVersion: "1.21.1"
      env:
        - { name: TYPE, value: PAPER }
        - { name: VERSION, value: "1.21.1" }
    - id: "1.21.1-fabric"
      displayName: "1.21.1 · Fabric"
      image: itzg/minecraft-server:java21
      loader: fabric
      gameVersion: "1.21.1"
      env:
        - { name: TYPE, value: FABRIC }
        - { name: VERSION, value: "1.21.1" }
    - id: "1.21.1-neoforge"
      displayName: "1.21.1 · NeoForge"
      image: itzg/minecraft-server:java21
      loader: neoforge
      gameVersion: "1.21.1"
      env:
        - { name: TYPE, value: NEOFORGE }
        - { name: VERSION, value: "1.21.1" }
    - id: "1.21.1-vanilla"
      displayName: "1.21.1 · Vanilla"
      image: itzg/minecraft-server:java21
      loader: vanilla
      gameVersion: "1.21.1"
      env:
        - { name: TYPE, value: VANILLA }
        - { name: VERSION, value: "1.21.1" }
    # ── 1.20.x ─────────────────────────────────────────────────────────
    - id: "1.20.4-paper"
      displayName: "1.20.4 · Paper"
      image: itzg/minecraft-server:java17
      loader: paper
      gameVersion: "1.20.4"
      env:
        - { name: TYPE, value: PAPER }
        - { name: VERSION, value: "1.20.4" }
    - id: "1.20.4-fabric"
      displayName: "1.20.4 · Fabric"
      image: itzg/minecraft-server:java17
      loader: fabric
      gameVersion: "1.20.4"
      env:
        - { name: TYPE, value: FABRIC }
        - { name: VERSION, value: "1.20.4" }
    - id: "1.20.4-forge"
      displayName: "1.20.4 · Forge"
      image: itzg/minecraft-server:java17
      loader: forge
      gameVersion: "1.20.4"
      env:
        - { name: TYPE, value: FORGE }
        - { name: VERSION, value: "1.20.4" }
    - id: "1.20.1-paper"
      displayName: "1.20.1 · Paper"
      image: itzg/minecraft-server:java17
      loader: paper
      gameVersion: "1.20.1"
      env:
        - { name: TYPE, value: PAPER }
        - { name: VERSION, value: "1.20.1" }
    - id: "1.20.1-fabric"
      displayName: "1.20.1 · Fabric"
      image: itzg/minecraft-server:java17
      loader: fabric
      gameVersion: "1.20.1"
      env:
        - { name: TYPE, value: FABRIC }
        - { name: VERSION, value: "1.20.1" }
    - id: "1.20.1-forge"
      displayName: "1.20.1 · Forge"
      image: itzg/minecraft-server:java17
      loader: forge
      gameVersion: "1.20.1"
      env:
        - { name: TYPE, value: FORGE }
        - { name: VERSION, value: "1.20.1" }
    # ── 1.19.4 / 1.18.2 (classic modded era) ───────────────────────────
    - id: "1.19.4-paper"
      displayName: "1.19.4 · Paper"
      image: itzg/minecraft-server:java17
      loader: paper
      gameVersion: "1.19.4"
      env:
        - { name: TYPE, value: PAPER }
        - { name: VERSION, value: "1.19.4" }
    - id: "1.19.4-forge"
      displayName: "1.19.4 · Forge"
      image: itzg/minecraft-server:java17
      loader: forge
      gameVersion: "1.19.4"
      env:
        - { name: TYPE, value: FORGE }
        - { name: VERSION, value: "1.19.4" }
    - id: "1.18.2-paper"
      displayName: "1.18.2 · Paper"
      image: itzg/minecraft-server:java17
      loader: paper
      gameVersion: "1.18.2"
      env:
        - { name: TYPE, value: PAPER }
        - { name: VERSION, value: "1.18.2" }
    - id: "1.18.2-forge"
      displayName: "1.18.2 · Forge"
      image: itzg/minecraft-server:java17
      loader: forge
      gameVersion: "1.18.2"
      env:
        - { name: TYPE, value: FORGE }
        - { name: VERSION, value: "1.18.2" }
    # ── 1.16.5 (Java 8 era) ────────────────────────────────────────────
    - id: "1.16.5-paper"
      displayName: "1.16.5 · Paper"
      image: itzg/minecraft-server:java8-multiarch
      loader: paper
      gameVersion: "1.16.5"
      env:
        - { name: TYPE, value: PAPER }
        - { name: VERSION, value: "1.16.5" }
    - id: "1.16.5-forge"
      displayName: "1.16.5 · Forge"
      image: itzg/minecraft-server:java8-multiarch
      loader: forge
      gameVersion: "1.16.5"
      env:
        - { name: TYPE, value: FORGE }
        - { name: VERSION, value: "1.16.5" }

  # Console commands behind agent features. The agent interprets these at
  # runtime — moderation templates render with .Player/.Reason; the quiesce
  # sequences run around backup snapshots.
  capabilities:
    players:
      kick: "kick {{.Player}}{{if .Reason}} {{.Reason}}{{end}}"
      ban: "ban {{.Player}}{{if .Reason}} {{.Reason}}{{end}}"
      unban: "pardon {{.Player}}"
      banList:
        command: "banlist players"
        entryRegex: '^\s*(?P<name>[A-Za-z0-9_]{1,32})\s+was banned by\s+(?P<source>[^:]+?)(?::\s*(?P<reason>.*))?\s*$'
      whitelist:
        list: "whitelist list"
        add: "whitelist add {{.Player}}"
        remove: "whitelist remove {{.Player}}"
        # "There are 2 whitelisted player(s): alice, bob" — capture the
        # comma-separated tail; "no whitelisted players" yields no match.
        listRegex: 'whitelisted player[s()]*:\s*(?P<names>.+)$'
    quiesce:
      quiesce: ["save-off", "save-all flush"]
      unquiesce: ["save-on"]
      failurePattern: "saving failed"
    # Graceful stop: the operator issues these over RCON, waits for the
    # server to save and go down, then scales the pod to zero — so a SIGTERM
    # never interrupts an in-progress world save.
    lifecycle:
      stop: ["stop"]
    actions:
      - id: broadcast
        displayName: Broadcast message
        description: Send a chat message to everyone on the server.
        icon: megaphone
        group: Server
        command: "say {{.Params.message}}"
        params:
          - name: message
            displayName: Message
            type: string
            required: true
      - id: set-time
        displayName: Set time
        icon: clock
        group: World
        command: "time set {{.Params.time}}"
        params:
          - name: time
            displayName: Time of day
            type: enum
            enum: ["day", "noon", "night", "midnight"]
            default: day
      - id: set-weather
        displayName: Set weather
        icon: cloud
        group: World
        command: "weather {{.Params.weather}}"
        params:
          - name: weather
            displayName: Weather
            type: enum
            enum: ["clear", "rain", "thunder"]
            default: clear
      - id: set-difficulty
        displayName: Set difficulty
        icon: settings
        group: World
        command: "difficulty {{.Params.level}}"
        params:
          - name: level
            displayName: Difficulty
            type: enum
            enum: ["peaceful", "easy", "normal", "hard"]
            default: normal
            required: true
      # whitelist-add / whitelist-remove were removed here — whitelist
      # management now lives solely on the Players tab
      # (capabilities.players.whitelist above), so quick actions don't
      # duplicate that UI.
      - id: save-world
        displayName: Save world
        description: Flush the world to disk now.
        icon: save
        group: World
        command: "save-all flush"
      - id: announce-restart
        displayName: Announce restart
        description: Warn players, save the world, then stop the server.
        icon: rotate-ccw
        group: Server
        danger: true
        confirm: true
        commands:
          - 'say {{.Params.message}}'
          - "save-all flush"
          - "stop"
        params:
          - name: message
            displayName: Message
            type: string
            default: "Server restarting shortly — please log out safely."
            required: true
    status:
      metrics:
        - id: seed
          displayName: World seed
          command: "seed"
          regex: 'Seed: \[(?P<value>-?\d+)\]'
        - id: difficulty
          displayName: Difficulty
          command: "difficulty"
          regex: 'The difficulty is (?P<value>\w+)'
    # Per-(version+loader) mod volumes. The active version's loader selects
    # which directory the dashboard's Mods tab manages and which volume the
    # operator provisions+mounts. Bukkit-family loaders use plugins/; mod
    # loaders use mods/. Vanilla has no entry, so vanilla servers show no
    # Mods tab.
    mods:
      loaders:
        paper:  { displayName: Plugins (Paper),  path: plugins, extensions: [".jar"] }
        spigot: { displayName: Plugins (Spigot), path: plugins, extensions: [".jar"] }
        bukkit: { displayName: Plugins (Bukkit), path: plugins, extensions: [".jar"] }
        purpur: { displayName: Plugins (Purpur), path: plugins, extensions: [".jar"] }
        forge:  { displayName: Mods (Forge),     path: mods,    extensions: [".jar"] }
        neoforge: { displayName: Mods (NeoForge), path: mods,   extensions: [".jar"] }
        fabric: { displayName: Mods (Fabric),    path: mods,    extensions: [".jar"] }
        quilt:  { displayName: Mods (Quilt),     path: mods,    extensions: [".jar"] }
      install:
        allowedHosts:
          - cdn.modrinth.com
          - .modrinth.com
          - .curseforge.com
          - .forgecdn.net
          - hangarcdn.papermc.io
          - hangar.papermc.io
          - github.com
          - .githubusercontent.com
        maxSizeMB: 512
      # In-app browse: the Mods tab can search Modrinth for the active
      # loader + game version and one-click install (the chosen file
      # downloads via the allowlist above — cdn.modrinth.com is listed).
      # The loader id is used verbatim as a Modrinth category facet.
      # Multiple registries; the dashboard shows a provider switch. Modrinth
      # is the default. CurseForge needs an API key (admin config) and is
      # hidden until configured. Hangar serves Paper/Velocity plugins.
      registry:
        providers:
          - provider: modrinth
            # Modpacks tab: installing a Modrinth modpack pins it via the
            # itzg image's native env (TYPE=MODRINTH + MODRINTH_MODPACK=<slug>),
            # which installs the whole pack on boot. One modpack per server.
            modpacks:
              refEnv: MODRINTH_MODPACK
              env:
                - { name: TYPE, value: MODRINTH }
          - provider: curseforge
          - provider: hangar

  probes:
    readiness:
      exec:
        command: ["mc-health"]
      initialDelaySeconds: 30
      periodSeconds: 10
      failureThreshold: 20
    liveness:
      exec:
        command: ["mc-health"]
      initialDelaySeconds: 120
      periodSeconds: 30
      failureThreshold: 5
    startup:
      exec:
        command: ["mc-health"]
      initialDelaySeconds: 30
      periodSeconds: 10
      failureThreshold: 60

  # TYPE and VERSION are driven by the versions[] picker above, so they are
  # NOT config fields here (avoids asking twice / double-binding).
  configSchema:
    - name: DIFFICULTY
      displayName: Difficulty
      type: enum
      enum: ["peaceful", "easy", "normal", "hard"]
      default: easy

    - name: MODE
      displayName: Game mode
      type: enum
      enum: ["survival", "creative", "adventure", "spectator"]
      default: survival

    - name: MAX_PLAYERS
      displayName: Max players
      type: int
      default: "20"

    - name: MOTD
      displayName: MOTD
      description: Server description shown in the multiplayer list.
      type: string
      default: "A Gameplane Minecraft server"

    - name: LEVEL_SEED
      displayName: World seed
      description: Leave blank for a random seed.
      type: string
      default: ""

    - name: WHITELIST_ENABLED
      displayName: Enforce whitelist
      type: bool
      default: "false"

    - name: PVP
      displayName: PvP enabled
      type: bool
      default: "true"

    - name: HARDCORE
      displayName: Hardcore mode
      type: bool
      default: "false"

    - name: ONLINE_MODE
      displayName: Online mode
      description: Verify players with Mojang. Disable only for offline/LAN setups.
      type: bool
      default: "true"

    - name: VIEW_DISTANCE
      displayName: View distance (chunks)
      type: int
      default: "10"

    # The itzg image passes these to the JVM as -Xms/-Xmx. Left empty,
    # the operator sizes both to 75% of the container memory limit
    # (autoFromMemoryLimit — needs gameplane ≥ 0.2.0-beta.6; the
    # remaining 25% is headroom for non-heap JVM memory, which is what
    # keeps the cgroup from OOM-killing the server). Equal -Xms/-Xmx
    # gives a fixed heap, which game servers prefer over GC-driven
    # resizes.
    - name: MAX_MEMORY
      displayName: JVM max heap
      description: >-
        Java heap ceiling (-Xmx, e.g. 2G, 3072M). Leave empty to size it
        automatically to 75% of the container memory limit — it then
        tracks the limit whenever you resize the server. If you set it
        yourself, keep roughly 25% below the limit: the JVM needs
        headroom for non-heap memory, and exceeding the limit gets the
        server OOM-killed.
      type: string
      autoFromMemoryLimit:
        percent: 75

    - name: INIT_MEMORY
      displayName: JVM initial heap
      description: >-
        Starting heap size (-Xms), at most JVM max heap. Leave empty to
        match the automatic max heap (a fixed heap avoids GC resizes).
      type: string
      autoFromMemoryLimit:
        percent: 75
