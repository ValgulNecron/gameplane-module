# Kestrel GameTemplate for Minecraft: Java Edition.
#
# Backed by the community itzg/minecraft-server image, which understands
# the env vars declared below (VERSION, TYPE, DIFFICULTY, …).
#
# Cluster-scoped; apply once per cluster:
#     kubectl apply -f modules/minecraft-java/template.yaml

apiVersion: kestrel.gg/v1alpha1
kind: GameTemplate
metadata:
  name: minecraft-java
  labels:
    kestrel.gg/module: minecraft-java
spec:
  displayName: Minecraft (Java Edition)
  game: minecraft-java
  version: 1.0.0
  # Brand color the dashboard tints this game's icon/accents with,
  # replacing the old hardcoded per-game color palette.
  accentColor: "#5b9a3e"
  description: |
    Vanilla, Paper, Spigot, Forge, Fabric, or Quilt Minecraft: Java Edition
    servers. Uses the community [itzg/minecraft-server](https://github.com/itzg/docker-minecraft-server)
    image, which understands the same env var interface (TYPE, VERSION,
    DIFFICULTY, …).

  image: itzg/minecraft-server:2025.1.0

  env:
    - name: EULA
      value: "TRUE"
    - name: ENABLE_RCON
      value: "true"
    - name: RCON_PORT
      value: "25575"
    - name: INIT_MEMORY
      value: "1G"
    - name: MAX_MEMORY
      value: "2G"

  ports:
    - name: game
      containerPort: 25565
      protocol: TCP
      advertise: true
    - name: rcon
      containerPort: 25575
      protocol: TCP
      advertise: false

  storage:
    size: 10Gi
    mountPath: /data

  # itzg/minecraft-server writes the server log under the data volume,
  # where the agent sidecar can tail it for the dashboard's Logs tab.
  logPath: /data/logs/latest.log

  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi

  rcon:
    protocol: source
    port: 25575
    # PasswordSecretRef left unset — operator will generate a password
    # and store it in a managed Secret named "<gameserver>-rcon".

  # Console commands behind agent features. The agent interprets these
  # at runtime — moderation templates render with .Player/.Reason; the
  # quiesce sequences run around backup snapshots.
  capabilities:
    players:
      kick: "kick {{.Player}}{{if .Reason}} {{.Reason}}{{end}}"
      ban: "ban {{.Player}}{{if .Reason}} {{.Reason}}{{end}}"
      unban: "pardon {{.Player}}"
      banList:
        command: "banlist players"
        entryRegex: '^\s*(?P<name>[A-Za-z0-9_]{1,32})\s+was banned by\s+(?P<source>[^:]+?)(?::\s*(?P<reason>.*))?\s*$'
    quiesce:
      quiesce: ["save-off", "save-all flush"]
      unquiesce: ["save-on"]
      failurePattern: "saving failed"
    # Operator buttons on the server detail page. Each renders its
    # command template with the collected params and runs it over RCON.
    actions:
      - id: broadcast
        displayName: Broadcast message
        description: Send a chat message to everyone on the server.
        icon: megaphone
        command: "say {{.Params.message}}"
        params:
          - name: message
            displayName: Message
            type: string
            required: true
      - id: set-time
        displayName: Set time
        icon: clock
        command: "time set {{.Params.time}}"
        params:
          - name: time
            displayName: Time of day
            type: enum
            enum: ["day", "noon", "night", "midnight"]
            default: day
      - id: set-weather
        displayName: Set weather
        icon: cloud
        command: "weather {{.Params.weather}}"
        params:
          - name: weather
            displayName: Weather
            type: enum
            enum: ["clear", "rain", "thunder"]
            default: clear
      - id: whitelist-add
        displayName: Whitelist player
        icon: user-plus
        command: "whitelist add {{.Params.player}}"
        params:
          - name: player
            displayName: Player name
            type: string
            required: true
      - id: whitelist-remove
        displayName: Remove from whitelist
        icon: user-minus
        command: "whitelist remove {{.Params.player}}"
        params:
          - name: player
            displayName: Player name
            type: string
            required: true
      - id: save-world
        displayName: Save world
        description: Flush the world to disk now.
        icon: save
        command: "save-all"
    # Live readouts on the Overview tab, each parsed from an RCON
    # command's output via the (?P<value>…) capture group.
    status:
      metrics:
        - id: seed
          displayName: World seed
          command: "seed"
          regex: 'Seed: \[(?P<value>-?\d+)\]'
        - id: difficulty
          displayName: Difficulty
          command: "difficulty"
          regex: 'The difficulty is (?P<value>\w+)'

  probes:
    readiness:
      exec:
        command: ["mc-health"]
      initialDelaySeconds: 30
      periodSeconds: 10
      failureThreshold: 20
    liveness:
      exec:
        command: ["mc-health"]
      initialDelaySeconds: 120
      periodSeconds: 30
      failureThreshold: 5
    startup:
      exec:
        command: ["mc-health"]
      initialDelaySeconds: 30
      periodSeconds: 10
      failureThreshold: 60

  configSchema:
    - name: TYPE
      displayName: Server type
      description: Server flavor. PAPER recommended for most plugin setups.
      type: enum
      enum: ["VANILLA", "PAPER", "SPIGOT", "BUKKIT", "FORGE", "FABRIC", "QUILT", "PURPUR"]
      default: VANILLA
      required: true

    - name: VERSION
      displayName: Minecraft version
      description: Exact version (e.g. "1.21.4") or "LATEST".
      type: string
      default: LATEST
      required: true

    - name: DIFFICULTY
      displayName: Difficulty
      type: enum
      enum: ["peaceful", "easy", "normal", "hard"]
      default: easy

    - name: MODE
      displayName: Game mode
      type: enum
      enum: ["survival", "creative", "adventure", "spectator"]
      default: survival

    - name: MAX_PLAYERS
      displayName: Max players
      type: int
      default: "20"

    - name: MOTD
      displayName: MOTD
      description: Server description shown in the multiplayer list.
      type: string
      default: "A Kestrel Minecraft server"

    - name: LEVEL_SEED
      displayName: World seed
      description: Leave blank for a random seed.
      type: string
      default: ""

    - name: WHITELIST_ENABLED
      displayName: Enforce whitelist
      type: bool
      default: "false"

    - name: PVP
      displayName: PvP enabled
      type: bool
      default: "true"

    - name: HARDCORE
      displayName: Hardcore mode
      type: bool
      default: "false"

    - name: ONLINE_MODE
      displayName: Online mode
      description: Verify players with Mojang. Disable only for offline/LAN setups.
      type: bool
      default: "true"

    - name: VIEW_DISTANCE
      displayName: View distance (chunks)
      type: int
      default: "10"
