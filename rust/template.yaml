# yaml-language-server: $schema=../.schema/gametemplate.schema.json
# Gameplane GameTemplate for Rust (dedicated server).
#
# Backed by didstopia/rust-server. Rust's RCON is WebSocket-only — Facepunch's
# own `rcon.web`/webrcon, which does NOT speak the Source RCON wire protocol.
# The agent now implements it (rcon.protocol: websocket), so the console,
# players list, moderation, quiesce and quick actions all work over RCON.
#
# The image enables webrcon by default (RUST_RCON_WEB=1) and serves plain
# ws:// (RUST_RCON_SECURE_WEBSOCKET=0), which is what the agent's client
# dials. The password comes from RUST_RCON_PASSWORD, injected by the operator.
#
# playerlist returns a JSON array rather than lines, which is fine: the agent
# applies players.list.entryRegex with FindAll over the whole reply, so the
# DisplayName regex below pulls every player out of the single-line JSON.
#
# Cluster-scoped; apply once per cluster:
#     kubectl apply -f modules/rust/template.yaml

apiVersion: gameplane.local/v1alpha1
kind: GameTemplate
metadata:
  name: rust
  labels:
    gameplane.local/module: rust
spec:
  displayName: Rust
  game: rust
  version: 1.1.0
  categories: [Survival, Shooter, PvP]
  accentColor: "#ce422b"
  description: |
    Rust dedicated server using
    [didstopia/rust-server](https://github.com/Didstopia/rust-server).
    Console, players list and moderation run over Rust's WebSocket RCON
    (Facepunch's webrcon). Oxide plugins are supported via the version
    picker.

  image: didstopia/rust-server:latest

  ports:
    - name: game
      containerPort: 28015
      protocol: UDP
      advertise: true
    # Rust's RCON: WebSocket-over-TCP (webrcon), which the agent now speaks.
    # Not advertised — the dashboard reaches it in-pod; exposing it publicly
    # would put the RCON password on the internet.
    - name: rcon
      containerPort: 28016
      protocol: TCP
      advertise: false

  storage:
    size: 10Gi
    mountPath: /steamcmd/rust

  resources:
    requests: {cpu: "1", memory: 4Gi}
    limits: {cpu: "4", memory: 8Gi}

  rcon:
    protocol: websocket
    port: 28016
    # The image reads its RCON password from RUST_RCON_PASSWORD (default
    # "docker" — the operator generates one and injects it here instead).
    passwordEnv: RUST_RCON_PASSWORD

  consoleMode: rcon

  capabilities:
    # Facepunch/community-documented clean-shutdown sequence. Now runs over
    # RCON rather than pty-stdin, so a stop or restart saves the world instead
    # of taking a SIGTERM mid-write.
    lifecycle:
      stop: ["server.save", "quit"]
    players:
      # playerlist returns a JSON array of player objects; entryRegex is applied
      # with FindAll across the whole reply, so this lifts out every DisplayName.
      list:
        command: "playerlist"
        entryRegex: '"DisplayName":"(?P<name>[^"]*)"'
      kick: 'kick "{{.Player}}"{{if .Reason}} "{{.Reason}}"{{end}}'
      ban: 'ban "{{.Player}}"{{if .Reason}} "{{.Reason}}"{{end}}'
    actions:
      - id: broadcast
        displayName: Broadcast message
        description: Send a chat message to everyone on the server.
        icon: megaphone
        group: Server
        command: 'say "{{.Params.message}}"'
        params:
          - name: message
            displayName: Message
            type: string
            required: true
      - id: save-world
        displayName: Save world
        description: Flush the world to disk now.
        icon: save
        group: World
        command: "server.save"
      - id: set-time
        displayName: Set time
        icon: clock
        group: World
        command: "env.time {{.Params.time}}"
        params:
          - name: time
            displayName: Time
            description: Hour of day, 0-24.
            type: int
            default: "12"
            required: true
    mods:
      loaders:
        oxide:
          displayName: Oxide Plugins
          path: oxide/plugins
          extensions: [".cs"]
      install:
        allowedHosts:
          - umod.org
          - github.com
          - .githubusercontent.com
        maxSizeMB: 256
      # uMod (Oxide) is Rust's plugin ecosystem — browse and install plugins
      # in-app rather than hunting for a raw .cs URL. Keyless.
      registry:
        providers:
          - provider: umod

  # Vanilla / Oxide each get their own mod volume (loader selects by id
  # below). Vanilla intentionally has no matching capabilities.mods.loaders
  # key, per the "absent/vanilla-style" rule — it correctly gets no Mods tab.
  versions:
    - id: vanilla
      displayName: Vanilla
      image: didstopia/rust-server:latest
      loader: vanilla
      default: true
      env:
        - { name: RUST_OXIDE_ENABLED, value: "0" }
    - id: oxide
      displayName: Oxide
      image: didstopia/rust-server:latest
      loader: oxide
      env:
        - { name: RUST_OXIDE_ENABLED, value: "1" }

  configSchema:
    - name: RUST_SERVER_NAME
      displayName: Server Name
      type: string
      default: "Gameplane Rust Server"
    - name: RUST_SERVER_MAXPLAYERS
      displayName: Max Players
      type: int
      default: "50"
    - name: RUST_SERVER_DESCRIPTION
      displayName: Server Description
      type: string
      default: ""
